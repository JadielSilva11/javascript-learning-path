<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        #texto{
            font: normal 20pt Arial;
            background-color: red;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <p id="texto" onclick="clicar()" onmouseenter="entrou()" onmouseout="saiu()">Interação...</p>
</body>

    <script>
        var a = window.document.querySelector('#texto')

        //Este código substitui as chamadas dos eventos no código HTML
        /*
            a.addEventListener('click', clicar)
            a.addEventListener('mouseenter', entrou)
            a.addEventListener('mouseout', saiu)

        */

        function clicar(){
            a.innerText = 'Clicou!'
            a.style.background = 'green'
        }
        function entrou(){
            a.innerText = 'Entrou!'
        }
        function saiu(){
            a.innerText = 'Saiu!'
            a.style.background = 'red'
        }
    </script>
</html>
