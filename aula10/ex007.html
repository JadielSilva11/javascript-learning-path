<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando valores</title>
    <style>
        input{
            width: 100px;
        }

        #btn{
            font: normal 15px Arial;
            width: 60px;
        }

        #btn:active{
            background-color: green;
        }

    </style>
</head>
<body>
    <h1>Calculadora de soma</h1>
    <input type="number" name="txt1" id="n1"> + 
    <input type="number" name="txt2" id="n2">
    <input id='btn' type="button" value="Somar" onclick="somar()">
    <p id="res">Resultado</p>
</body>
<script>
    function somar(){
        var txt1 = window.document.querySelector('#n1')
        var txt2 = window.document.querySelector('#n2')
        var res  = window.document.getElementById('res')

        var n1 = Number.parseInt(txt1.value)
        var n2 = Number.parseInt(txt2.value)
        var soma = n1 + n2

        res.innerHTML= `A soma é: <strong>${soma}</strong>`
    }
</script>
</html>
